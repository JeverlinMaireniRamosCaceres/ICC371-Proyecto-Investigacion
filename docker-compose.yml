version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www/html

    working_dir: /var/www/html

    depends_on:
      - db

    networks:
      - investigacion

  db:
    image: mysql:8.4

    container_name: mysql_db

    restart: unless-stopped

    ports:
      - "3306:3306"

    environment:
      MYSQL_DATABASE: investigacion
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

    networks:
      - investigacion

volumes:
  mysql_data:

networks:
  investigacion:
    driver: bridge